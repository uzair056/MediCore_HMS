{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Email & Password</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="{% static 'doctors/css/doctor_login.css' %}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style></style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-sign-in-alt"></i>
        <h2>Log in</h2>
      </div>
      <div class="subhead">
        <i class="fas fa-arrow-right-to-bracket" style="margin-right: 6px"></i>
        access your account
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" autocomplete="off" novalidate  method="POST" action="{% url 'doctor_login' %}">
           {% csrf_token %}
        <!-- EMAIL -->
        <div class="form-group">
          <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
          <div class="input-wrapper">
            <i class="fas fa-at"></i>
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="you@example.com"
              required
              aria-required="true"
              value=""
            />
          </div>
          <span class="hint"
            ><i class="fas fa-check-circle" style="color: #3696b3"></i> valid
            email required</span
          >
        </div>

        <!-- PASSWORD with toggle -->
        <div class="form-group">
          <label for="loginPassword"
            ><i class="fas fa-lock"></i> Password</label
          >
          <div class="input-wrapper">
            <i class="fas fa-key"></i>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="••••••••"
              required
              aria-required="true"
              minlength="4"
              value=""
            />
            <button
              type="button"
              class="toggle-password"
              id="togglePasswordBtn"
              aria-label="Toggle password visibility"
              tabindex="0"
            >
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
          <span class="hint"
            ><i class="fas fa-shield-alt"></i> at least 4 characters</span
          >
        </div>

        <!-- submit button -->
        <button type="submit" class="btn-login">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign in
        </button>

        <!-- dynamic message -->
        <div class="demo-message" id="demoMessage">
          <i class="fas fa-info-circle"></i>
          <span id="messageText">Use strong password and correct information</span>
        </div>
      </form>

      <div class="login-footer">
        <span
          ><i class="fas fa-user-plus" style="margin-right: 6px"></i> Don't have
          an account? <a href="{% url 'register' %}">Register</a></span
        >
        <span
          ><i class="fas fa-key" style="margin-right: 6px"></i>
          <a href="#">Forgot password?</a></span
        >
      </div>
    </div>

 <script>
    src="{% static 'doctors/js/doctor_login.js' %}"
  </script>  
  </body>
</html>
