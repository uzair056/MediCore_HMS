{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register · Name, Email, Password</title>
  <!-- Font Awesome for subtle icons (optional but clean) -->
     <link rel="stylesheet" href="{% static 'users/css/register.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
   
    /* custom invalid / valid style not used, but keep it clean */
  </style>
</head>
<body>
  <div class="register-card">
    <h2>
      <i class="fas fa-user-plus"></i> Register
    </h2>
    <div class="subhead">
      <i class="fas fa-pen" style="margin-right: 6px;"></i> create your account
    </div>

    <!-- REGISTRATION FORM -->
    <form id="registerForm" autocomplete="off" novalidate>
      <!-- NAME -->
      <div class="form-group">
        <label for="fullName"><i class="fas fa-user"></i> Full name</label>
        <div class="input-wrapper">
          <i class="fas fa-user-circle"></i>
          <input 
            type="text" 
            id="fullName" 
            name="name" 
            placeholder="e.g. Ahmed Khan" 
            required 
            aria-required="true"
          >
        </div>
        <span class="hint"><i class="fas fa-asterisk" style="font-size: 0.45rem; vertical-align: middle;"></i> required</span>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email address</label>
        <div class="input-wrapper">
          <i class="fas fa-at"></i>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com" 
            required 
            aria-required="true"
          >
        </div>
        <span class="hint"><i class="fas fa-check-circle" style="color: #3a9ebf;"></i> valid email required</span>
      </div>

      <!-- PASSWORD with show/hide toggle -->
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required 
            aria-required="true"
            minlength="6"
          >
          <button 
            type="button" 
            class="toggle-password" 
            id="togglePasswordBtn"
            aria-label="Toggle password visibility"
            tabindex="0"
          >
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        <span class="hint"><i class="fas fa-shield-alt"></i> at least 6 characters</span>
      </div>

      <!-- submit button -->
      <button type="submit" class="btn-register">
        <i class="fas fa-user-check"></i> Sign up
      </button>

      <!-- demo feedback (non-intrusive) -->
      <div class="demo-message" id="demoMessage">
        <i class="fas fa-info-circle"></i> 
        <span id="messageText">Fill in the fields & click Sign up</span>
      </div>
    </form>

    <div class="register-footer">
      <i class="fas fa-arrow-right" style="margin-right: 4px;"></i> Already have an account? <a href="#">Log in</a>
    </div>
  </div>

  <script>
    src="{% static 'users/js/register.js' %}"
  </script>
</body>
</html>
